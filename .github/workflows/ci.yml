name: CI

on:
  push:
  pull_request:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s tests -v

      - name: Run coverage with threshold
        env:
          PYTHONPATH: src
        run: |
          python -m coverage erase
          python -m coverage run --branch -m unittest discover -s tests -v
          python -m coverage report --include="src/linear_search.py" --fail-under=100 -m
          python -m coverage html -d htmlcov

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  mutation-testing:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mutation testing
        env:
          PYTHONPATH: src
          RANDOM_JOURNAL_FILE: random_mutation_journal.txt
        run: |
          cosmic-ray init cosmic-ray-ci.toml ci_session.sqlite
          cosmic-ray --verbosity=INFO baseline cosmic-ray-ci.toml
          cosmic-ray exec cosmic-ray-ci.toml ci_session.sqlite
          cr-report ci_session.sqlite > mutation_report.txt

      - name: Upload mutation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: |
            ci_session.sqlite
            mutation_report.txt
            random_mutation_journal.txt
